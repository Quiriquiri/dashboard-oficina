<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Oficina — Visão Geral</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<script src="dashboard.js"></script>
<script>
function render(P, now) {
  const kpiExt = P.decorrerExterno.length;
  const kpiInt = P.workshops.reduce((s, w) => s + w.decorrer.length, 0);
  const kpiPlanPendente = P.workshops.reduce((s, w) => s + w.planeamento.length, 0);
  const kpiMetal = P.metalomecanica.length;
  const kpiPedreiras = P.pedreiras.reduce((s, p) => s + p.cards.length, 0);
  const res = P.resolution;

  const workshopData = P.workshops.map(w => [w.label, w.decorrer.length, `decorrer-interno.html#${w.key}`]);
  const workshopColors = [CAT_BLUE, CAT_AQUA, CAT_YELLOW];

  const supplierCounts = {};
  P.decorrerExterno.forEach(c => { if (c.supplier) supplierCounts[c.supplier] = (supplierCounts[c.supplier]||0)+1; });
  const supplierData = Object.entries(supplierCounts).sort((a,b) => b[1]-a[1]).slice(0, 8)
    .map(([label, v]) => [label, v, 'decorrer-externo.html']);

  const pedreirasData = P.pedreiras.map(p => [p.label, p.cards.length, `pedreiras.html#${p.key}`]);

  const labelCounts = {};
  P.planeamentoInterno.forEach(c => {
    const names = c.labels.length ? c.labels.map(l => l.name) : ['(sem etiqueta)'];
    names.forEach(n => { labelCounts[n] = (labelCounts[n]||0) + 1; });
  });
  const labelData = Object.entries(labelCounts).sort((a,b) => b[1]-a[1])
    .map(([label, v]) => [label, v, `planeamento-interno.html#${slug(label)}`]);

  const trendPoints = res.monthlyAvgLast14.map(([k,v]) => [monthLabel(k), Math.round(v*10)/10]);

  document.getElementById('content').innerHTML = `
    <div class="kpi-row">
      <div class="stat-tile"><div class="label">Cartões em curso</div><div class="value">${P.totals.totalOpen}</div></div>
      <div class="stat-tile"><div class="label">A Decorrer Externo</div><div class="value">${kpiExt}</div></div>
      <div class="stat-tile"><div class="label">A Decorrer Interno</div><div class="value">${kpiInt}</div><div class="sub">${kpiPlanPendente} a aguardar planeamento</div></div>
      <div class="stat-tile"><div class="label">Pendentes Pedreiras</div><div class="value">${kpiPedreiras}</div></div>
      <div class="stat-tile"><div class="label">Pendentes Metalomecânica</div><div class="value">${kpiMetal}</div></div>
      <div class="stat-tile"><div class="label">Resolução (mediana)</div><div class="value">${res.median.toFixed(0)}d</div><div class="sub">média ${res.mean.toFixed(0)}d</div></div>
    </div>

    <section class="card">
      <h2>A Decorrer Externo <a class="see-more" href="decorrer-externo.html">Ver detalhe →</a></h2>
      <p class="desc">${kpiExt} cartões atualmente em curso · top fornecedores (clica numa barra para ver a lista completa)</p>
      ${hbarChart(supplierData, CAT_BLUE, {width:720, barH:16, gap:10})}
    </section>

    <section class="card">
      <h2>A Decorrer Interno <a class="see-more" href="decorrer-interno.html">Ver detalhe →</a></h2>
      <p class="desc">${kpiInt} cartões a decorrer nas oficinas [Simão], por categoria — clica numa barra para ver a lista dessa categoria</p>
      ${hbarChart(workshopData, workshopColors, {barH:20, gap:16})}
    </section>

    <section class="card">
      <h2>Tempos médios de resolução</h2>
      <p class="desc">Calculado por (data de conclusão − data de início) para todos os ${res.count} cartões do quadro com ambas as datas preenchidas · tendência mensal, média de dias por mês de conclusão</p>
      <div class="kpi-row" style="margin-bottom:18px;">
        <div class="stat-tile"><div class="label">Mediana</div><div class="value">${res.median.toFixed(1)}d</div></div>
        <div class="stat-tile"><div class="label">Média</div><div class="value">${res.mean.toFixed(1)}d</div></div>
        <div class="stat-tile"><div class="label">P90</div><div class="value">${res.p90.toFixed(0)}d</div><div class="sub">90% dos cartões resolvem-se neste prazo ou menos</div></div>
        <div class="stat-tile"><div class="label">Amostra</div><div class="value">${res.count}</div></div>
      </div>
      ${lineChart(trendPoints)}
      <details class="tbl-toggle"><summary>Ver valores mensais</summary>
        <table><thead><tr><th data-type="text">Mês</th><th data-type="num">Média (dias)</th></tr></thead>
          <tbody>${res.monthlyAvgLast14.map(([k,v]) => { const vv = Math.round(v*10)/10; return `<tr><td data-sort="${k}">${esc(monthLabel(k))}</td><td data-sort="${vv}">${vv}</td></tr>`; }).join('')}</tbody></table>
      </details>
    </section>

    <section class="card">
      <h2>Serviços Pendentes em Pedreiras <a class="see-more" href="pedreiras.html">Ver detalhe →</a></h2>
      <p class="desc">${kpiPedreiras} cartões pendentes em obra, por pedreira — clica numa barra para ver essa pedreira</p>
      ${hbarChart(pedreirasData, CAT_BLUE, {barH:20, gap:16})}
    </section>

    <section class="card">
      <h2>Serviços solicitados à Metalomecânica <a class="see-more" href="metalomecanica.html">Ver detalhe →</a></h2>
      <p class="desc">${kpiMetal} cartões pendentes · lista "Metalomecanica"</p>
    </section>

    <section class="card">
      <h2>Planeamento Interno <a class="see-more" href="planeamento-interno.html">Ver detalhe →</a></h2>
      <p class="desc">${P.planeamentoInterno.length} cartões a aguardar planeamento, por etiqueta — clica numa barra para ver esse grupo</p>
      ${labelData.length ? hbarChart(labelData, CAT_BLUE, {barH:16, gap:10}) : '<p class="info-note">Sem cartões nesta lista de momento.</p>'}
    </section>

    <footer class="note">
      Fonte: API do Trello do board "${esc(P.boardName)}", em direto a partir deste browser. Os tempos de resolução usam os campos "Início" e "Concluído" de cada cartão — cartões sem uma das duas datas não entram na amostra. Cartões usados apenas como separadores de secção (ex: "▼PRAGOSA▼") são excluídos de todas as contagens e tabelas.
    </footer>
  `;
}
initPage('index', render);
</script>
</body>
</html>
